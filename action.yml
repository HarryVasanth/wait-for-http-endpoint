name: "Wait for HTTP Endpoint"
description: "Polls an HTTP(S) endpoint until it returns the expected status code or timeout is exceeded"
branding:
  icon: activity
  color: blue

inputs:
  url:
    description: "URL to poll (http/https)"
    required: true
  method:
    description: "HTTP method to use"
    required: false
    default: "GET"
  expected-status:
    description: "Expected HTTP status code(s) (comma-separated)"
    required: false
    default: "200"
  timeout:
    description: "Timeout in milliseconds"
    required: false
    default: "60000"
  interval:
    description: "Polling interval in milliseconds"
    required: false
    default: "1000"
  insecure:
    description: "Skip TLS certificate verification (allow self-signed certs)"
    required: false
    default: "false"
  follow-redirects:
    description: "Follow HTTP redirects"
    required: false
    default: "false"
  bearer-token:
    description: "Optional Bearer token for the Authorization header"
    required: false

runs:
  using: "docker"
  image: "Dockerfile"
